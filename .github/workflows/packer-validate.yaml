name: Validate Packer code

on:
  workflow_call:
    secrets:
      BWS_ACCESS_TOKEN:
        required: true
        description: Bitwarden secret manager access token
      BWS_PROJECT_ID:
        required: true
        description: Bitwarden secret manager project ID

jobs:

  validate:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup packer
        uses: hashicorp/setup-packer@main
        with:
          version: ${{ vars.PACKER_VERSION }}

      - name: Packer init
        run: packer init .

      - name: Validate code
        run: packer validate .
        env:
          BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
          BWS_PROJECT_ID: ${{ secrets.BWS_PROJECT_ID }}
